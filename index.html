<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#211c15">
  <title>赵云与阿斗</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #211b14;
      overflow: hidden;
    }
    body {
      position: relative;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
        env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    body::before {
      content: "";
      position: fixed;
      inset: -28px;
      z-index: 0;
      background:
        radial-gradient(circle at 50% 42%, rgba(229, 216, 191, 0.52), rgba(35, 28, 20, 0.72) 64%, rgba(18, 14, 10, 0.92)),
        url("./assets/battlefield-ink-v1.jpg") center / cover no-repeat;
      filter: blur(14px) saturate(0.72);
      transform: scale(1.045);
    }
    canvas {
      position: relative;
      z-index: 1;
      display: block;
      outline: none;
      background: #e6d9c3;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.46), 0 0 0 1px rgba(241, 224, 191, 0.2);
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    @media (max-width: 520px) {
      html, body { background: #d8cab0; }
      body::before {
        inset: -12px;
        background:
          linear-gradient(rgba(225, 212, 187, 0.58), rgba(205, 188, 159, 0.58)),
          url("./assets/battlefield-ink-v1.jpg") center / cover no-repeat;
        filter: blur(7px) saturate(0.68);
      }
      canvas { box-shadow: 0 8px 28px rgba(50, 37, 23, 0.34); }
    }
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <canvas id="game" role="application" tabindex="0" aria-keyshortcuts="Enter Escape P R B X 1 2 3 4 5" aria-describedby="game-help" aria-label="赵云与阿斗，标题界面"></canvas>
  <p id="game-help" class="visually-hidden">标题页：数字 1 至 5 选择已解锁关卡，回车开始，R 两次确认重置，Escape 取消重置。战斗中：回车迎敌，P 暂停，R 征兵，B 毛笔，X 铲地，数字 1 至 5 拿起营栏字牌后点击棋盘部署。</p>
  <output id="game-status" class="visually-hidden" aria-live="polite"></output>
  <script type="module" src="src/main.js"></script>
</body>
</html>
